<!doctype html>
<html lang="en">
  <head>
    <!-- Meta Setup -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luxury AI Chatbot</title>

    <!-- Bootstrap 5 CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Google Font (Luxury Feel) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/animations.css" />
  </head>

  <body>
    <!-- Main Container -->
    <div
      class="container-fluid vh-100 d-flex justify-content-center align-items-center main-bg"
    >
      <!-- Chat Wrapper -->
      <div class="chat-container">
        <!-- Header -->
        <div class="chat-header text-center">
          <h4 class="mb-0">Luxury Assistant</h4>
          <small>Your Fashion AI</small>
        </div>

        <!-- Chat Body -->
        <div class="chat-body" id="chatBody">
          <!-- Example Bot Message -->
          <div class="message bot-message">
            <p>Welcome! How can I assist you today?</p>
          </div>
        </div>

        <!-- Quick Actions -->
        <div class="quick-actions text-center">
          <button class="btn quick-btn" data-action="formal">
            Formal Wear
          </button>
          <button class="btn quick-btn" data-action="bridal">Bridal</button>
          <button class="btn quick-btn" data-action="alterations">
            Alterations
          </button>
        </div>

        <!-- Input Area -->
        <div class="chat-input">
          <div class="input-group">
            <input
              type="text"
              id="userInput"
              class="form-control"
              placeholder="Type your message..."
            />
            <button class="btn send-btn" id="sendBtn">Send</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS Files -->
    <script src="js/app.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/bot.js"></script>
  </body>
</html>
